<!doctype html> 
<html> 
  <head> 
    <title>Student Result</title> 

    <style>
      body {
        
        background-color: lightblue;
        text-align: center;
        padding: 50px;
      }

      h2 {
        color: navy;
        margin-bottom: 30px;
      }


    </style>

  </head> 
  <body> 

    <h2>Student Result Program</h2> 

    <div class="result-box">
      <script> 
        var subjects = prompt("Enter number of subjects"); 
        var total = 0; 
        for (var i = 1; i <= subjects; i++) { 
          var marks = prompt("Enter marks of subject " + i); 
          total = total + Number(marks); 
        } 

        var average = total / subjects; 
        var grade; 
        var result; 

        if (average >= 60) { 
          grade = "A"; 
          result = "Pass"; 
        } else if (average >= 50) { 
          grade = "B"; 
          result = "Pass"; 
        } else if (average >= 40) { 
          grade = "C"; 
          result = "Pass"; 
        } else { 
          grade = "D"; 
          result = "Fail"; 
        } 

        document.write("Total Marks = " + total); 
        document.write("<br>"); 
        document.write("Average Marks = " + average); 
        document.write("<br>"); 
        document.write("Grade = " + grade); 
        document.write("<br>"); 
        document.write("Result = " + result); 
      </script> 
    </div>

  </body> 
</html>
